meta:
  id: athens_democracy_yaml
  name: 雅典直接民主制（YAML）
  version: "0.3.0"
  pattern: consensus
  description: Boulē proposes, sampled citizens vote by majority, strategos executes, Dikasteria audits only when disputed.

entry_stage: boule_planner

agents:
  boule_planner_1:
    runtime_id: boule_planner_1
    role: planner
    instructions: 你负责议程设置与提案整形，确保提案可被公民大会直接投票。
  citizen_01:
    runtime_id: citizen_01
    role: voter
    instructions: 海贸扩展派公民：若提案能提升海上通道与贸易收益则倾向 yes；收益不明且风险高则倾向 no。
  citizen_02:
    runtime_id: citizen_02
    role: voter
    instructions: 财政审慎派公民：优先控制财政负担与长期成本；预算不清或成本过高时倾向 no。
  citizen_03:
    runtime_id: citizen_03
    role: voter
    instructions: 农政稳健派公民：优先保障农业生产与民生稳定；对扰动民生较大的提案倾向 no。
  citizen_04:
    runtime_id: citizen_04
    role: voter
    instructions: 程序法治派公民：重点审查程序合法性与授权边界；程序不清或越权迹象时倾向 no。
  citizen_05:
    runtime_id: citizen_05
    role: voter
    instructions: 安全现实派公民：重视外部威胁与防务可行性；能显著提升安全时倾向 yes。
  citizen_06:
    runtime_id: citizen_06
    role: voter
    instructions: 公民自由派公民：关注权力扩张与公民负担；若限制公民权利或代价过高则倾向 no。
  citizen_07:
    runtime_id: citizen_07
    role: voter
    instructions: 海贸扩展派公民：若提案能提升海上通道与贸易收益则倾向 yes；收益不明且风险高则倾向 no。
  strategos_1:
    runtime_id: strategos_1
    role: executor
    instructions: 严格按公民大会通过的提案执行，不得擅自扩权；出现重大程序或合法性争议时返回 dispute。
  dikasteria_1:
    runtime_id: dikasteria_1
    role: auditor
    instructions: 对争议执行进行追溯审查，证据不足以推翻则 approve，严重违规则 invalidate。

stages:
  - id: boule_planner
    kind: planner
    agent: boule_planner_1
    soul_file_path: souls/boule_planner.md
    prompt_template: >
      你是五百人议事会（抽样等价建模），负责形成可投票的政策提案与执行边界。任务: {title} 输入: {input_text}
      返回 decision=next。
    transitions:
      - decision: next
        to: ekklesia_vote
      - decision: default
        to: ekklesia_vote

  - id: ekklesia_vote
    kind: consensus
    soul_file_path: souls/ekklesia_vote.md
    prompt_template: >
      你是公民大会投票层。请基于提案进行表决，仅返回 yes 或 no。
    consensus:
      voters:
        - citizen_01
        - citizen_02
        - citizen_03
        - citizen_04
        - citizen_05
        - citizen_06
        - citizen_07
      algorithm: majority
      threshold: 0.5
      tie_breaker: reject
      error_handling: abstain
    transitions:
      - decision: approve
        to: strategos_execute
      - decision: reject
        to: completed
      - decision: default
        to: completed

  - id: strategos_execute
    kind: executor
    agent: strategos_1
    soul_file_path: souls/strategos_execute.md
    prompt_template: >
      你是将军执行层，落实已通过提案。若执行中出现重大程序争议或合法性争议，返回 dispute；否则返回 next。
    transitions:
      - decision: next
        to: completed
      - decision: dispute
        to: dikasteria_audit
      - decision: default
        to: completed

  - id: dikasteria_audit
    kind: auditor
    agent: dikasteria_1
    soul_file_path: souls/dikasteria_audit.md
    prompt_template: >
      你是陪审法庭，对争议执行进行追溯审查。approve=维持有效，invalidate=判定无效。
    transitions:
      - decision: approve
        to: completed
      - decision: invalidate
        to: completed
      - decision: default
        to: completed

  - id: completed
    kind: terminal

features:
  - name: monitor
    enabled: true
    config:
      label: 公民监督旁路

  - name: shared_state
    enabled: true
    config: {}

policy:
  require_json_decision: false
  max_steps: 24

x_report_feature_catalog:
  - name: randomized_planner
    mapped_to: stage.boule_planner
    runtime_support: external_or_adapter_level
  - name: sampled_citizen_consensus
    mapped_to: stage.ekklesia_vote
    runtime_support: modeled_by_topology
  - name: conditional_auditor
    mapped_to: stage.strategos_execute->dikasteria_audit
    runtime_support: modeled_by_topology
