stages:
  - id: citizen_propose
    kind: initiator
    agent: random_citizen
    soul_file_path: souls/citizen_propose.md
    prompt_template: >
      你是随机公民提案入口。请提交可审议的公共议题摘要，返回 decision=next。
    transitions:
      - decision: next
        to: boule_gate
      - decision: default
        to: boule_gate

  - id: boule_gate
    kind: gate
    agent: boule_planner_1
    soul_file_path: souls/boule_gate.md
    prompt_template: >
      你是五百人议事会过滤节点，判断提案是否具备上会条件。approve=进入公民大会，reject=驳回终止。
    transitions:
      - decision: approve
        to: ekklesia_vote
      - decision: reject
        to: completed
      - decision: default
        to: completed

  - id: ekklesia_vote
    kind: consensus
    soul_file_path: souls/ekklesia_vote_challenge.md
    prompt_template: >
      你是公民大会投票层。请基于提案进行表决，仅返回 yes 或 no。
    consensus:
      voters:
        - citizen_01
        - citizen_02
        - citizen_03
        - citizen_04
        - citizen_05
        - citizen_06
        - citizen_07
        - citizen_08
        - citizen_09
        - citizen_10
        - citizen_11
        - citizen_12
        - citizen_13
        - citizen_14
        - citizen_15
        - citizen_16
        - citizen_17
        - citizen_18
        - citizen_19
        - citizen_20
        - citizen_21
        - citizen_22
        - citizen_23
        - citizen_24
        - citizen_25
        - citizen_26
        - citizen_27
        - citizen_28
        - citizen_29
        - citizen_30
        - citizen_31
      algorithm: majority
      threshold: 0.5
      tie_breaker: challenge
    transitions:
      - decision: approve
        to: strategos_execute
      - decision: challenge
        to: dikasteria_audit
      - decision: default
        to: completed

  - id: dikasteria_audit
    kind: auditor
    agent: dikasteria_1
    soul_file_path: souls/dikasteria_mid_audit.md
    prompt_template: >
      你是陪审法庭，对投票阶段触发的合法性挑战做中段审查。approve=允许进入执行，invalidate=终止。
    transitions:
      - decision: approve
        to: strategos_execute
      - decision: invalidate
        to: completed
      - decision: default
        to: completed

  - id: strategos_execute
    kind: executor
    agent: strategos_1
    soul_file_path: souls/strategos_execute.md
    prompt_template: >
      你是将军执行层，落实已通过提案。仅在获得公民大会或陪审法庭批准后执行。返回 next。
    transitions:
      - decision: next
        to: completed
      - decision: default
        to: completed

  - id: completed
    kind: terminal

features:
  - name: monitor
    enabled: true
    config:
      label: 公民监督旁路

  - name: shared_state
    enabled: true
    config: {}

policy:
  require_json_decision: false
  max_steps: 24

x_report_feature_catalog:
  - name: open_citizen_entry
    mapped_to: stage.citizen_propose
    runtime_support: modeled_by_topology
  - name: agenda_gate
    mapped_to: stage.boule_gate
    runtime_support: modeled_by_topology
  - name: randomized_planner
    mapped_to: stage.boule_gate
    runtime_support: external_or_adapter_level
  - name: sampled_citizen_consensus
    mapped_to: stage.ekklesia_vote
    runtime_support: modeled_by_topology
  - name: pre_execution_judicial_challenge
    mapped_to: stage.ekklesia_vote->dikasteria_audit
    runtime_support: modeled_by_topology
