meta:
  id: athens_open_challenge_yaml
  name: 雅典直接民主制（开放提案+中段司法挑战，YAML）
  version: "0.1.0"
  pattern: consensus
  description: Open citizen proposal entry with Boulē agenda gate, majority vote, and mid-process Dikasteria challenge path.

entry_stage: citizen_propose

agents:
  random_citizen:
    runtime_id: random_citizen
    role: initiator
