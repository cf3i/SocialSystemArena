meta:
  id: soviet_party_state_yaml
  name: 苏联党国体制（YAML）
  version: "0.2.0"
  pattern: pipeline
  description: Politburo internal-consensus planning pipeline with party-state execution and formal ratification.

entry_stage: politburo_planner

agents:
  politburo:
    runtime_id: politburo
    role: planner
    instructions: 作为政治局以集体协商形成单一政策输出；对外仅发布统一决策口径。
  sovmin:
    runtime_id: sovmin
    role: executor
    instructions: 作为部长会议把政治局方向转译为部委可执行政务指令。
  gosplan:
    runtime_id: gosplan
    role: executor
    instructions: 作为国家计委进行指标、产能与资源配额分配。
  republic_exec:
    runtime_id: republic_exec
    role: executor
    instructions: 作为加盟共和国与地方执行体系落实计划并回传实施结果。
  supreme_soviet:
    runtime_id: supreme_soviet
    role: executor
    instructions: 作为最高苏维埃进行形式性追认与法定发布。

stages:
  - id: politburo_planner
    kind: planner
    agent: politburo
    soul_file_path: souls/politburo_planner.md
    description: 政治局内部协商后输出统一政策决策。
    transitions:
      - decision: next
        to: sovmin_deploy
      - decision: default
        to: sovmin_deploy

  - id: sovmin_deploy
    kind: executor
    agent: sovmin
    soul_file_path: souls/sovmin_deploy.md
    description: 部长会议将政策转为部委执行部署。
    transitions:
      - decision: next
        to: gosplan_allocate
      - decision: default
        to: gosplan_allocate

  - id: gosplan_allocate
    kind: executor
    agent: gosplan
    soul_file_path: souls/gosplan_allocate.md
    description: 国家计委下达资源与指标配额。
    transitions:
      - decision: next
        to: republic_execute
      - decision: default
        to: republic_execute

  - id: republic_execute
    kind: executor
    agent: republic_exec
    soul_file_path: souls/republic_execute.md
    description: 加盟共和国与地方层按指标执行并反馈。
    transitions:
      - decision: next
        to: formal_ratify
      - decision: default
        to: formal_ratify

  - id: formal_ratify
    kind: executor
    agent: supreme_soviet
    soul_file_path: souls/formal_ratify.md
    description: 最高苏维埃进行形式化追认与发布。
    transitions:
      - decision: next
        to: completed
      - decision: default
        to: completed

  - id: completed
    kind: terminal

policy:
  require_json_decision: false
  max_steps: 24

x_report_feature_catalog:
  - name: planner_internal_consensus
    mapped_to: stage.politburo_planner
    runtime_support: modeled_by_soul_and_agent_instructions
