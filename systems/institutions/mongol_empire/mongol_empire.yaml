meta:
  id: mongol_empire_yaml
  name: 蒙古帝国札撒与汗国制（YAML）
  version: "0.2.0"
  pattern: pipeline
  description: Great Khan decree pipeline with recursive executor decomposition (10x per level).

entry_stage: khagan_order

agents:
  khagan:
    runtime_id: khagan
    role: initiator
    timeout_sec: 45
    retries: 1
    instructions: 作为大汗定义征调目标、时间要求与札撒红线，不直接下钻到户级细节。
  imperial_secretariat:
    runtime_id: imperial_secretariat
    role: planner
    timeout_sec: 45
    retries: 1
    instructions: 作为中枢书记官将大汗命令转化为万户级可执行配额方案。
  tumen_commander:
    runtime_id: tumen_commander
    role: executor
    timeout_sec: 45
    retries: 1
    instructions: 作为万户长把任务按 1:10 分解给千户长，并汇总辖下进度。
  mingghan_commander:
    runtime_id: mingghan_commander
    role: executor
    timeout_sec: 45
    retries: 1
    instructions: 作为千户长把任务按 1:10 分解给百户长，并回传征调状态。
  jaghun_commander:
    runtime_id: jaghun_commander
    role: executor
    timeout_sec: 45
    retries: 1
    instructions: 作为百户长把任务按 1:10 分解给十户长，并监控末端落实。
  arban_commander:
    runtime_id: arban_commander
    role: executor
    timeout_sec: 45
    retries: 1
    instructions: 作为十户长执行户级动员与集结，形成末端完成回报。

stages:
  - id: khagan_order
    kind: initiator
    agent: khagan
    soul_file_path: souls/khagan_order.md
    description: 大汗发布征调令并定义边界。
    transitions:
      - decision: next
        to: imperial_plan
      - decision: default
        to: imperial_plan

  - id: imperial_plan
    kind: planner
    agent: imperial_secretariat
    soul_file_path: souls/imperial_plan.md
    description: 中枢将征调令转成万户级配额与节奏计划。
    transitions:
      - decision: next
        to: tumen_level_execute
      - decision: default
        to: tumen_level_execute

  - id: tumen_level_execute
    kind: executor
    agent: tumen_commander
    soul_file_path: souls/tumen_level_execute.md
    description: 万户级执行并向下分解到千户级。
    transitions:
      - decision: next
        to: mingghan_level_execute
      - decision: default
        to: mingghan_level_execute

  - id: mingghan_level_execute
    kind: executor
    agent: mingghan_commander
    soul_file_path: souls/mingghan_level_execute.md
    description: 千户级执行并向下分解到百户级。
    transitions:
      - decision: next
        to: jaghun_level_execute
      - decision: default
        to: jaghun_level_execute

  - id: jaghun_level_execute
    kind: executor
    agent: jaghun_commander
    soul_file_path: souls/jaghun_level_execute.md
    description: 百户级执行并向下分解到十户级。
    transitions:
      - decision: next
        to: arban_level_execute
      - decision: default
        to: arban_level_execute

  - id: arban_level_execute
    kind: executor
    agent: arban_commander
    soul_file_path: souls/arban_level_execute.md
    description: 十户级落实动员并回报完成情况。
    transitions:
      - decision: next
        to: completed
      - decision: default
        to: completed

  - id: completed
    kind: terminal

policy:
  require_json_decision: false
  max_steps: 32

x_report_feature_catalog:
  - name: recursive_executor
    mapped_to: stage_sequence.tumen_to_arban
    runtime_support: modeled_by_multistage_pipeline
